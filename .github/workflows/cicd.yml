name: ci-cd

on:
  push:
    branches: ["main", "production"]
  workflow_dispatch: {}

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend
  BUILD_BACKEND: "true" # Đặt "false" nếu tạm thời chưa build/push backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:cache,mode=max

      - name: Build & push backend
        if: env.BUILD_BACKEND == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout (deploy job)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "docker-compose.yml"
          target: ${{ secrets.SSH_TARGET_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            cd ${{ secrets.SSH_TARGET_DIR }}
            cat > .env <<EOF
            TAG=${{ github.sha }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            EOF
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
