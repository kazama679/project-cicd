services:
  frontend:
    image: ${FRONTEND_IMAGE:-your-dockerhub-username/todo-frontend}:${TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - app
    env_file:
      - .env

  backend:
    profiles:
      - backend
    image: ${BACKEND_IMAGE:-your-dockerhub-username/todo-backend}:${TAG:-latest}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-rikkei_prod}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-rikkei}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rikkei_prod}
      POSTGRES_USER: ${POSTGRES_USER:-rikkei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rikkei}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  db_data:
